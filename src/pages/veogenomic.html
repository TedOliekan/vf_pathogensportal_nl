@@include('./header - veo.html')

<style>
.dataset-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}

.dataset-section {
  margin-bottom: 40px;
}

.dataset-card {
  border: 1px solid #e3e3e3;
  border-radius: 6px;
  background: #fafafa;
  padding: 16px;
  transition: 0.15s ease;
}

.dataset-card:hover {
  background: #f5f5f5;
  border-color: #b5b5b5;
}

.tag {
  font-size: 12px;
  display: inline-block;
  padding: 3px 6px;
  border-radius: 4px;
  margin-bottom: 6px;
}

.raw { background: #e8f0ff; }
.assembly { background: #e9f7ea; }
.consensus { background: #fff3e6; }

a {
  color: #1a73e8;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

#searchBox {
  width: 100%;
  max-width: 420px;
  padding: 10px;
  margin: 10px 0 20px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  margin: 4px;
  padding: 8px 12px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #eee;
}
</style>

<div class="vf-content">

<a href="./veo.html">
  <img src="./images/CV19DP_banner subpage_veo.jpg" style="width:100%">
</a>

<br><br>

<h3>Introduction: Genomic Data</h3>
<p>
Welcome to the VEO Genomic Data portal. This page provides curated sequencing datasets including genomic, metagenomic, and environmental data.
</p>

<h3>Available Genomic Datasets</h3>

<!-- FILTERS -->
<div>
  <button onclick="setFilter('all')">All</button>
  <button onclick="setFilter('raw')">Raw reads</button>
  <button onclick="setFilter('assembly')">Assemblies</button>
  <button onclick="setFilter('consensus')">Consensus genomes</button>



</div>

<input id="searchBox" placeholder="Search datasets...">

<div class="dataset-grid" id="grid"></div>

let currentFilter = "all";

function render() {
  const grid = document.getElementById("grid");
  const search = document.getElementById("searchBox").value.toLowerCase();
  grid.innerHTML = "";

  data.forEach(d => {
    const matchFilter = currentFilter === "all" || d.type === currentFilter;
    const matchSearch =
      d.title.toLowerCase().includes(search) ||
      d.desc.toLowerCase().includes(search);

    if (!matchFilter || !matchSearch) return;

    const div = document.createElement("div");
    div.className = "dataset-card";

    div.innerHTML = `
      <div class="tag ${d.type}">${d.type.toUpperCase()}</div>
      <h4><a href="${d.url}" target="_blank">${d.title}</a></h4>
      <p>${d.desc}</p>
    `;

    grid.appendChild(div);
  });
}

function setFilter(type) {
  currentFilter = type;
  render();
}

document.getElementById("searchBox").addEventListener("input", render);

render();
