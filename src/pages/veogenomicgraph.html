<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Clickable Genomic Surveillance Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; width:100%; }

.popup-title {
  font-weight: bold;
  margin-bottom: 5px;
}

.popup-link {
  display: inline-block;
  margin-top: 6px;
  padding: 4px 8px;
  background: #1f6feb;
  color: white;
  text-decoration: none;
  border-radius: 4px;
  font-size: 12px;
}
.popup-link:hover {
  background: #0d4ed8;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

const map = L.map('map').setView([52, 10], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

/* ---------------- HELP FUNCTION ---------------- */
function addDataset(lat, lon, title, desc, url, color) {

  const marker = L.circleMarker([lat, lon], {
    radius: 8,
    color: color,
    fillColor: color,
    fillOpacity: 0.85
  }).addTo(map);

  marker.bindPopup(`
    <div class="popup-title">${title}</div>
    <div>${desc}</div>
    <a class="popup-link" href="${url}" target="_blank">
      Open source dataset →
    </a>
  `);
}

/* ---------------- EUROPE SURVEILLANCE ---------------- */

/* 🇳🇱 Rotterdam wastewater SARS-CoV-2 */
addDataset(
  51.9244, 4.4777,
  "Rotterdam Wastewater SARS-CoV-2",
  "Longitudinal wastewater sequencing (2020–2022)",
  "https://www.ebi.ac.uk/ena/browser/view/PRJEB48206",
  "red"
);

/* 🇩🇰 Copenhagen sewage metagenomes */
addDataset(
  55.6761, 12.5683,
  "Copenhagen Sewage Metagenomes",
  "Time-series wastewater genomics (EU longitudinal surveillance)",
  "https://www.ebi.ac.uk/ena/browser/view/PRJEB68319",
  "orange"
);

/* 🇮🇹 Bologna integrated surveillance */
addDataset(
  44.4949, 11.3426,
  "Bologna Integrated Surveillance",
  "Wastewater + mobility + clinical COVID-19 integration",
  "https://github.com/FraDurazzi/BolognaCOVID_Sewage_Mobility",
  "blue"
);

/* 🇫🇷 France WWTP SARS-CoV-2 */
addDataset(
  47.2184, -1.5536,
  "France Wastewater SARS-CoV-2 (ONT sequencing)",
  "Wastewater sequencing using ARTIC / ONT pipelines",
  "https://www.ebi.ac.uk/ena/browser/view/ERP015409",
  "purple"
);

/* 🇳🇱 Netherlands / Belgium wastewater genomes */
addDataset(
  52.3676, 4.9041,
  "Netherlands / Belgium Wastewater Genomes",
  "SARS-CoV-2 consensus genomes from wastewater",
  "https://gisaid.org/",
  "green"
);

/* 🇬🇱 Greenland environmental genomics */
addDataset(
  72.0000, -40.0000,
  "Greenland Environmental Genomics",
  "Ice sheet metagenomes + midden microbiomes (extreme environment surveillance)",
  "https://www.ncbi.nlm.nih.gov/bioproject/PRJEB103059",
  "cyan"
);

/* 🌍 Global sewage virome */
addDataset(
  20, 0,
  "Global Sewage Virome",
  "Worldwide wastewater virome diversity dataset",
  "https://www.ebi.ac.uk/ena/browser/view/PRJEB87273",
  "yellow"
);

</script>

</body>
</html>
